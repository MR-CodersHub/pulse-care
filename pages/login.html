<!DOCTYPE html>
<html lang="en" data-theme="light" dir="ltr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Account Login - PulseCare Mobile Health Portal</title>
  <link rel="icon" type="image/png" href="../assets/images/favicon.png">

  <!-- Font Awesome CDN -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <!-- Style Links -->
  <link rel="stylesheet" href="../assets/css/style.css">
  <link rel="stylesheet" href="../assets/css/animations.css">
  <link rel="stylesheet" href="../assets/css/responsive.css">
  <link rel="stylesheet" href="../assets/css/rtl.css">
</head>

<body>

  <!-- Top Settings Bar -->
  <div class="auth-top-bar">
    <div class="auth-top-actions">
      <button class="theme-toggle" aria-label="Toggle Dark/Light Mode"><i class="fa-solid fa-moon"></i></button>
      <button class="lang-toggle" aria-label="Toggle RTL Layout"><i class="fa-solid fa-right-left"></i></button>
    </div>
  </div>

  <!-- Centered Login Layout -->
  <div class="auth-wrapper reveal">
    <!-- Subtle medical themed background glows -->
    <div class="auth-ambient-glow-1"></div>
    <div class="auth-ambient-glow-2"></div>

    <div class="auth-container">

      <!-- Brand Logo Header -->
      <div class="auth-logo-container">
        <a href="../index.html" class="logo" aria-label="PulseCare Home">
          <div class="logo-icon"><i class="fa-solid fa-heartbeat"></i></div>
          <span>PulseCare</span>
        </a>
      </div>

      <!-- Authentication Card -->
      <div class="card auth-card">
        <div class="auth-header-text">
          <h1>Welcome Back</h1>
          <p>Access your secure clinical portal and medical records.</p>
        </div>

        <form class="needs-validation" novalidate action="./dashboard-user.html">
          <div class="form-group form-floating">
            <input type="email" class="form-control" id="loginEmail" placeholder=" " required data-validation="email">
            <label for="loginEmail" class="form-label">Email Address</label>
            <div class="invalid-feedback">Please enter a valid account email.</div>
          </div>

          <div class="form-group form-floating" style="margin-bottom: 1rem;">
            <input type="password" class="form-control" id="loginPassword" placeholder=" " required
              style="padding-right: 3rem;">
            <label for="loginPassword" class="form-label">Account Password</label>

            <!-- Eye icon trigger button -->
            <button type="button" class="password-peek-toggle" aria-label="Toggle Password Visibility"
              style="position: absolute; right: 1rem; top: 50%; transform: translateY(-50%); color: var(--text-muted); font-size: 1.1rem; border: none; background: none; cursor: pointer; display: flex; align-items: center; justify-content: center; height: 40px; width: 40px; z-index: 10;"><i
                class="fa-solid fa-eye"></i></button>
          </div>

          <!-- Helper check toggles -->
          <div class="flex justify-between align-center mb-4" style="font-size: 0.85rem; font-weight: 500;">
            <label class="flex align-center" style="gap: 0.5rem; cursor: pointer; color: var(--text-muted);">
              <input type="checkbox" style="width: 16px; height: 16px;"> Keep me signed in
            </label>
            <a href="#" style="color: var(--primary);">Forgot Password?</a>
          </div>

          <!-- Route triggers login mock submission -->
          <button type="submit" class="btn btn-primary btn-lg" style="width: 100%; margin-bottom: 1.5rem;"><i
              class="fa-solid fa-arrow-right-to-bracket"></i> Sign In</button>

          <!-- Social auth options divider -->
          <div class="auth-divider">
            <span>Or login with</span>
          </div>

          <!-- Grid of social options (Google + Apple side-by-side) -->
          <div class="auth-social-grid">
            <a href="./dashboard-user.html" class="btn btn-outline btn-sm" aria-label="Log in with Google"><i
                class="fa-brands fa-google" style="color: var(--danger);"></i> Google</a>
            <a href="./dashboard-user.html" class="btn btn-outline btn-sm" aria-label="Log in with Apple"><i
                class="fa-brands fa-apple"></i> Apple</a>
          </div>

          <div class="text-center" style="font-size: 0.9rem; color: var(--text-muted); font-weight: 500;">
            Don't have an active account? <a href="./register.html" style="color: var(--primary);">Create account</a>
          </div>
        </form>
      </div>
    </div>
  </div>

  <!-- Script references routing to parent assets folder -->
  <script src="../assets/js/theme.js"></script>
  <script src="../assets/js/rtl.js"></script>
  <script src="../assets/js/loader.js"></script>
  <script src="../assets/js/validation.js"></script>
  <script src="../assets/js/main.js"></script>
</body>

</html>
